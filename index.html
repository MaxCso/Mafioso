<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>La Famiglia — Jeu Mafia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Special+Elite&family=Libre+Baskerville:ital@0;1&display=swap');

:root {
  --noir: #0a0a0a;
  --rouge: #8b1a1a;
  --rouge-vif: #c0392b;
  --or: #c9a84c;
  --or-pale: #e8d5a3;
  --papier: #f4e8c1;
  --papier-sombre: #d4c49a;
  --gris: #3a3a3a;
  --blanc: #f0ece0;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body {
  font-family: 'Special Elite', cursive;
  background: var(--noir);
  color: var(--blanc);
  min-height: 100vh;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px;
}
.screen.active { display: flex; }

/* ===== LAUNCH ===== */
#screen-launch {
  background: radial-gradient(ellipse at center, #1a0a0a 0%, #000 70%);
}
.launch-content { text-align: center; }
.launch-logo {
  font-family: 'Playfair Display', serif;
  font-size: clamp(64px, 18vw, 100px);
  font-weight: 900;
  font-style: italic;
  color: var(--or);
  line-height: 0.9;
  text-shadow: 0 0 60px rgba(201,168,76,0.4);
  margin-bottom: 20px;
}
.launch-subtitle {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--papier-sombre);
  text-transform: uppercase;
  margin-bottom: 40px;
}
.launch-ornament { color: var(--rouge); margin: 0 8px; }
.launch-deco {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 auto 40px;
  max-width: 200px;
}
.launch-deco-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--or), transparent); opacity: 0.4; }
.btn-launch {
  background: transparent;
  border: 1px solid rgba(201,168,76,0.5);
  color: var(--or-pale);
  font-family: 'Special Elite', cursive;
  font-size: 13px;
  letter-spacing: 6px;
  text-transform: uppercase;
  padding: 16px 48px;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 2px;
}
.btn-launch:active { background: rgba(201,168,76,0.1); }

/* ===== DIVIDER ===== */
.section-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 400px;
  margin: 8px 0;
}
.divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.4), transparent); }
.divider-diamond { width: 6px; height: 6px; background: var(--or); transform: rotate(45deg); opacity: 0.6; }

/* ===== CONFIG ===== */
#screen-config {
  background: linear-gradient(180deg, #0e0a05 0%, #0a0a0a 100%);
  justify-content: flex-start;
  padding-top: 40px;
  gap: 16px;
}
.config-header { width: 100%; max-width: 400px; }
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 6vw, 30px);
  font-style: italic;
  color: var(--or);
  text-align: center;
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.player-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
.player-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 2px;
  padding: 4px 12px 4px 4px;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
.player-num {
  width: 32px;
  height: 32px;
  border-radius: 2px;
  background: rgba(139,26,26,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--or);
  flex-shrink: 0;
}
.player-item input {
  flex: 1;
  background: none;
  border: none;
  color: var(--blanc);
  font-family: 'Special Elite', cursive;
  font-size: 15px;
  outline: none;
  padding: 10px 4px;
}
.player-item input::placeholder { color: rgba(240,236,224,0.3); }
.btn-delete {
  background: none;
  border: none;
  color: var(--rouge);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  opacity: 0.6;
}
.btn-delete:active { opacity: 1; }
.roles-info {
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 2px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--papier-sombre);
  line-height: 1.8;
  width: 100%;
  max-width: 400px;
}
.roles-info strong { color: var(--or); }
.separator { width:100%;max-width:400px;text-align:center;margin:4px 0;font-size:18px;color:var(--rouge);letter-spacing:8px; }
.alert-msg {
  background: rgba(139,26,26,0.3);
  border: 1px solid var(--rouge);
  padding: 10px 16px;
  border-radius: 2px;
  font-size: 12px;
  color: var(--blanc);
  text-align: center;
  width: 100%;
  max-width: 400px;
  display: none;
}

/* ===== BOUTONS ===== */
.btn-primary {
  width: 100%;
  max-width: 400px;
  padding: 16px;
  background: linear-gradient(135deg, var(--rouge) 0%, #5a0e0e 100%);
  border: none;
  color: var(--blanc);
  font-family: 'Special Elite', cursive;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}
.btn-primary:active { transform: scale(0.98); filter: brightness(1.2); }
.btn-secondary {
  width: 100%;
  max-width: 400px;
  padding: 14px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--or-pale);
  font-family: 'Special Elite', cursive;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}
.btn-secondary:active { background: rgba(201,168,76,0.1); }

/* ===== REVEAL ===== */
#screen-reveal { background: #0d0d0d; gap: 0; }
.reveal-card { width: 100%; max-width: 360px; text-align: center; }
.reveal-hidden { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.reveal-hidden-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 8vw, 40px);
  font-style: italic;
  color: var(--or);
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
}
.reveal-hidden-sub { font-size: 11px; letter-spacing: 4px; color: var(--papier-sombre); text-transform: uppercase; }
.btn-show-role {
  padding: 16px 40px;
  background: linear-gradient(135deg, var(--rouge), #5a0e0e);
  border: none;
  color: var(--blanc);
  font-family: 'Special Elite', cursive;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.btn-show-role:active { transform: scale(0.97); }
.reveal-progress { font-size: 11px; letter-spacing: 3px; color: var(--papier-sombre); margin-bottom: 20px; text-transform: uppercase; }
.dossier {
  background: linear-gradient(160deg, #1c1208 0%, #0e0a05 100%);
  border: 1px solid var(--or);
  border-radius: 4px;
  padding: 30px 24px;
  position: relative;
  overflow: hidden;
  margin-bottom: 20px;
}
.dossier::before {
  content: 'DOSSIER CONFIDENTIEL';
  position: absolute;
  top: 14px;
  right: -28px;
  background: var(--rouge);
  color: white;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 4px 40px;
  transform: rotate(45deg);
}
.dossier-stamp { font-family:'Playfair Display',serif;font-size:10px;letter-spacing:5px;color:rgba(201,168,76,0.5);text-transform:uppercase;margin-bottom:16px; }
.player-name-reveal {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 7vw, 36px);
  font-style: italic;
  color: var(--or);
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
}
.role-image-placeholder {
  width: 90px;
  height: 90px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.4);
  border: 2px solid;
}
.role-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 900;
  margin-bottom: 10px;
}
.role-desc {
  font-family: 'Libre Baskerville', serif;
  font-size: 12px;
  font-style: italic;
  line-height: 1.7;
  color: var(--papier-sombre);
  max-width: 260px;
  margin: 0 auto 16px;
}
.role-extra {
  border-radius: 4px;
  padding: 10px;
  font-size: 12px;
  margin-top: 8px;
}
.role-mafia .role-name { color: var(--rouge-vif); }
.role-mafia .role-image-placeholder { border-color: var(--rouge); }
.role-police .role-name { color: #4a9eff; }
.role-police .role-image-placeholder { border-color: #4a9eff; }
.role-undercover .role-name { color: #a855f7; }
.role-undercover .role-image-placeholder { border-color: #a855f7; }
.role-civil .role-name { color: var(--papier-sombre); }
.role-civil .role-image-placeholder { border-color: var(--papier-sombre); }
.btn-confirm {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--or-pale);
  font-family: 'Special Elite', cursive;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.btn-confirm:active { background: rgba(201,168,76,0.1); }

/* ===== NIGHT ===== */
#screen-night {
  background: #000;
  overflow: hidden;
}
.night-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 20%, #0a0a2a 0%, #000 60%);
}
.night-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.night-phase { font-size: 10px; letter-spacing: 5px; color: rgba(240,236,224,0.4); text-transform: uppercase; }
.night-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 10vw, 52px);
  font-style: italic;
  color: var(--or);
  line-height: 1;
  text-shadow: 0 0 40px rgba(201,168,76,0.3);
}
.night-subtitle { font-family:'Libre Baskerville',serif;font-style:italic;font-size:14px;color:rgba(240,236,224,0.5); }
.night-instruction {
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: 15px;
  color: rgba(240,236,224,0.7);
  line-height: 1.7;
  min-height: 50px;
  transition: opacity 0.5s;
  white-space: pre-line;
}
.night-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.5s;
  min-height: 24px;
}
.night-indicator.visible { opacity: 1; }
.indicator-dot { width:8px;height:8px;border-radius:50%;background:var(--or);animation:blink 1.5s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.indicator-text { font-size:11px;letter-spacing:3px;color:var(--or-pale);text-transform:uppercase; }
.night-mafia-box {
  background: rgba(168,85,247,0.1);
  border: 1px solid rgba(168,85,247,0.4);
  border-radius: 4px;
  padding: 12px 16px;
  font-size: 13px;
  color: #c084fc;
  display: none;
  width: 100%;
}
.night-mafia-box.show { display: block; }
.btn-next-phase {
  width: 100%;
  padding: 18px;
  background: transparent;
  border: 1px solid rgba(240,236,224,0.2);
  color: rgba(240,236,224,0.6);
  font-family: 'Special Elite', cursive;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 2px;
}
.btn-next-phase:disabled { opacity: 0.3; pointer-events: none; }
.btn-next-phase:not(:disabled):active { background: rgba(201,168,76,0.1); border-color: var(--or); color: var(--or); }

/* ===== DAY ===== */
#screen-day {
  background: linear-gradient(180deg, #1a0f05 0%, #0a0a0a 100%);
  justify-content: flex-start;
  padding-top: 30px;
  gap: 14px;
}
.day-header { width: 100%; max-width: 400px; text-align: center; }
.day-round { font-size: 10px; letter-spacing: 4px; color: var(--papier-sombre); text-transform: uppercase; margin-bottom: 8px; }
.timer-display {
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 14vw, 72px);
  color: var(--or);
  line-height: 1;
  text-shadow: 0 0 30px rgba(201,168,76,0.3);
  transition: color 0.3s;
}
.timer-display.urgent { color: var(--rouge-vif); animation: pulse 0.8s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.timer-controls { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
.btn-timer {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--or-pale);
  font-family: 'Special Elite', cursive;
  font-size: 11px;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.btn-timer:active { background: rgba(201,168,76,0.1); }
.suspects-header { font-size: 10px; letter-spacing: 4px; color: var(--papier-sombre); text-transform: uppercase; width: 100%; max-width: 400px; }
.suspects-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: 40vh; }
.suspect-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 2px;
  padding: 10px 14px;
  transition: all 0.3s;
  animation: slideIn 0.3s ease;
}
.suspect-item.eliminated { opacity: 0.4; background: rgba(139,26,26,0.1); border-color: rgba(139,26,26,0.2); }
.suspect-avatar {
  width: 36px;
  height: 36px;
  border-radius: 2px;
  background: rgba(139,26,26,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-style: italic;
  color: var(--or);
  flex-shrink: 0;
}
.suspect-name { flex: 1; font-size: 16px; color: var(--blanc); }
.btn-eliminate {
  padding: 8px 14px;
  background: transparent;
  border: 1px solid var(--rouge);
  color: var(--rouge);
  font-family: 'Special Elite', cursive;
  font-size: 10px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}
.btn-eliminate:active { background: var(--rouge); color: white; }
.day-footer { width: 100%; max-width: 400px; display: flex; gap: 10px; padding-bottom: 10px; }

/* ===== GAME OVER ===== */
#screen-gameover {
  background: radial-gradient(ellipse at center, #1a0808 0%, #000 70%);
}
.gameover-content { text-align: center; animation: fadeInUp 0.8s ease; }
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.gameover-verdict { font-size:11px;letter-spacing:6px;color:var(--papier-sombre);text-transform:uppercase;margin-bottom:20px; }
.gameover-winner {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 10vw, 60px);
  font-weight: 900;
  font-style: italic;
  line-height: 1;
  margin-bottom: 16px;
  text-shadow: 0 0 60px currentColor;
}
.winner-police { color: #4a9eff; }
.winner-mafia { color: var(--rouge-vif); }
.gameover-sub { font-family:'Libre Baskerville',serif;font-style:italic;font-size:15px;color:var(--papier-sombre);margin-bottom:40px;line-height:1.6; }

/* ===== FLASH ===== */
#flash-overlay {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 99999;
  transition: opacity 0.05s;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rouge);border-radius:2px}
</style>
</head>
<body>

<div id="flash-overlay"></div>

<!-- ===== LAUNCH ===== -->
<div id="screen-launch" class="screen active">
  <div class="launch-content">
    <div class="launch-logo">La<br>Famiglia</div>
    <div class="launch-subtitle">
      <span class="launch-ornament">✦</span>
      Jeu de Rôles Mafia
      <span class="launch-ornament">✦</span>
    </div>
    <div class="launch-deco">
      <div class="launch-deco-line"></div>
      <span style="color:var(--rouge);font-size:20px;">❧</span>
      <div class="launch-deco-line"></div>
    </div>
    <button class="btn-launch" onclick="initAudio()">
      <span>Entrer</span>
    </button>
    <div style="margin-top:20px;font-size:10px;letter-spacing:3px;color:rgba(240,236,224,0.3);">
      APPUYEZ POUR ACTIVER L'AUDIO
    </div>
  </div>
</div>

<!-- ===== CONFIG ===== -->
<div id="screen-config" class="screen">
  <div class="config-header">
    <div class="section-title">Les Joueurs</div>
    <div class="section-divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
  </div>

  <div id="alert-config" class="alert-msg"></div>
  <div class="player-list" id="player-list"></div>

  <button class="btn-secondary" onclick="addPlayer()">+ Ajouter un joueur</button>
  <div id="roles-preview" class="roles-info"></div>
  <div class="separator">· · ·</div>
  <button class="btn-primary" onclick="startDistribution()">Distribuer les Rôles →</button>
</div>

<!-- ===== REVEAL ===== -->
<div id="screen-reveal" class="screen">
  <div id="reveal-waiting" class="reveal-card">
    <div class="reveal-hidden">
      <div class="reveal-hidden-name" id="reveal-player-name">—</div>
      <div class="reveal-hidden-sub">C'est votre tour</div>
      <button class="btn-show-role" onclick="showRole()">Découvrir mon rôle</button>
    </div>
  </div>

  <div id="reveal-showing" class="reveal-card" style="display:none">
    <div class="reveal-progress" id="reveal-progress">Joueur 1 / 6</div>
    <div class="dossier" id="reveal-dossier">
      <div class="dossier-stamp">Dossier N°<span id="dossier-num">001</span></div>
      <div class="player-name-reveal" id="dossier-player-name"></div>
      <div id="role-image-container"></div>
      <div class="role-name" id="dossier-role-name"></div>
      <div class="role-desc" id="dossier-role-desc"></div>
      <div id="dossier-extra"></div>
    </div>
    <button class="btn-confirm" id="btn-next-player" onclick="nextPlayer()">
      Passer au suivant →
    </button>
  </div>
</div>

<!-- ===== NIGHT ===== -->
<div id="screen-night" class="screen">
  <div class="night-bg"></div>
  <div class="night-content">
    <div class="night-phase">Phase de Nuit</div>
    <div class="night-title">La Nuit</div>
    <div class="night-subtitle">tombe sur la ville</div>
    <div class="night-instruction" id="night-instruction">La ville s'endort...</div>
    <div class="night-mafia-box" id="night-mafia-box"></div>
    <div class="night-indicator" id="night-indicator">
      <div class="indicator-dot"></div>
      <div class="indicator-text" id="indicator-text">En cours...</div>
    </div>
    <button class="btn-next-phase" id="btn-day" onclick="startDay()" disabled>☀ Passer au Jour</button>
    <button class="btn-secondary" onclick="goToMenu()">Menu</button>
  </div>
</div>

<!-- ===== DAY ===== -->
<div id="screen-day" class="screen">
  <div class="day-header">
    <div class="day-round" id="day-round">Tour 1 — Le Débat</div>
    <div class="timer-display" id="timer-display">5:00</div>
    <div class="timer-controls">
      <button class="btn-timer" onclick="addTime(60)">+1 min</button>
      <button class="btn-timer" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
    </div>
  </div>

  <div class="suspects-header">Suspects</div>
  <div class="suspects-list" id="suspects-list"></div>

  <div class="day-footer">
    <button class="btn-secondary" style="flex:1;max-width:none" onclick="goToMenu()">Menu</button>
    <button class="btn-primary" style="flex:2;max-width:none" onclick="startNight()">Nuit →</button>
  </div>
</div>

<!-- ===== GAME OVER ===== -->
<div id="screen-gameover" class="screen">
  <div class="gameover-content">
    <div class="gameover-verdict">Verdict Final</div>
    <div class="gameover-winner" id="gameover-winner"></div>
    <div class="gameover-sub" id="gameover-sub"></div>
    <div class="section-divider" style="max-width:200px;margin:0 auto 40px">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
    <button class="btn-primary" style="max-width:300px" onclick="restartGame()">Nouvelle Partie</button>
  </div>
</div>

<script>
// ============================================================
//  DONNÉES
// ============================================================
const ROLES = {
  mafia: {
    name: 'Mafieux',
    emoji: '🔫',
    color: '#c0392b',
    desc: 'Vous faites partie de la Famiglia. La nuit, vous vous réveillez en silence et identifiez vos complices.',
    cssClass: 'role-mafia'
  },
  undercover: {
    name: 'Infiltré',
    emoji: '🕵️',
    color: '#a855f7',
    desc: "Vous êtes un agent secret. La nuit, vous ouvrez les yeux pour identifier les Mafieux — mais eux ne vous voient pas.",
    cssClass: 'role-undercover'
  },
  police: {
    name: 'Agent de Police',
    emoji: '🚔',
    color: '#4a9eff',
    desc: 'Vous défendez la ville. Le jour, débattez et votez pour éliminer les membres de la Mafia.',
    cssClass: 'role-police'
  },
  civil: {
    name: 'Civil',
    emoji: '👤',
    color: '#d4c49a',
    desc: 'Simple citoyen. Le jour, participez au débat et aidez à identifier les membres de la Mafia.',
    cssClass: 'role-civil'
  }
};

// ============================================================
//  STATE
// ============================================================
const STATE = {
  players: [],
  round: 1,
  timerSeconds: 300,
  timerInterval: null,
  timerPaused: false,
  revealIndex: 0,
  audioUnlocked: false,
  audioCtx: null,
  sounds: {}
};

// ============================================================
//  AUDIO
// ============================================================
function initAudio() {
  STATE.audioUnlocked = true;
  try {
    STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {}
  showScreen('screen-config');
  renderPlayerList();
  initDefaultPlayers();
}

function playTone(freq, duration, type = 'sine', vol = 0.3) {
  if (!STATE.audioCtx) return;
  try {
    const osc = STATE.audioCtx.createOscillator();
    const gain = STATE.audioCtx.createGain();
    osc.connect(gain);
    gain.connect(STATE.audioCtx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, STATE.audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, STATE.audioCtx.currentTime + duration);
    osc.start();
    osc.stop(STATE.audioCtx.currentTime + duration);
  } catch(e) {}
}

function playChime() { playTone(880, 0.6, 'sine', 0.2); setTimeout(() => playTone(1100, 0.5, 'sine', 0.15), 200); }
function playElim() { playTone(200, 0.8, 'sawtooth', 0.3); setTimeout(() => playTone(150, 1, 'sawtooth', 0.2), 300); }
function playWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.6, 'sine', 0.25), i * 200));
}
function playLose() {
  [400, 300, 200].forEach((f, i) => setTimeout(() => playTone(f, 0.7, 'sawtooth', 0.3), i * 300));
}

// ============================================================
//  SCREENS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ============================================================
//  CONFIG
// ============================================================
function initDefaultPlayers() {
  STATE.players = [
    { name: 'Alice', role: '', alive: true },
    { name: 'Bob', role: '', alive: true },
    { name: 'Charlie', role: '', alive: true },
    { name: 'Diana', role: '', alive: true },
    { name: 'Eve', role: '', alive: true },
  ];
  renderPlayerList();
}

function renderPlayerList() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  STATE.players.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'player-item';
    div.innerHTML = `
      <div class="player-num">${i + 1}</div>
      <input type="text" placeholder="Joueur ${i + 1}" value="${p.name}"
        oninput="STATE.players[${i}].name = this.value; updateRolesPreview()">
      ${STATE.players.length > 3 ? `<button class="btn-delete" onclick="removePlayer(${i})">✕</button>` : ''}
    `;
    list.appendChild(div);
  });
  updateRolesPreview();
}

function addPlayer() {
  if (STATE.players.length >= 12) { showAlert('alert-config', 'Maximum 12 joueurs !'); return; }
  STATE.players.push({ name: '', role: '', alive: true });
  renderPlayerList();
}

function removePlayer(i) {
  if (STATE.players.length <= 3) { showAlert('alert-config', 'Minimum 3 joueurs !'); return; }
  STATE.players.splice(i, 1);
  renderPlayerList();
}

function updateRolesPreview() {
  const n = STATE.players.length;
  const el = document.getElementById('roles-preview');
  const nMafia = Math.max(1, Math.floor(n / 4));
  const nUnder = n >= 5 ? 1 : 0;
  const nPolice = n - nMafia - nUnder;
  el.innerHTML = `<strong>Distribution automatique :</strong><br>
    🔫 ${nMafia} Mafieux &nbsp;·&nbsp; 🚔 ${nPolice} Police${nUnder ? ' &nbsp;·&nbsp; 🕵️ 1 Infiltré' : ''}`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRoles(n) {
  const nMafia = Math.max(1, Math.floor(n / 4));
  const nUnder = n >= 5 ? 1 : 0;
  const nPolice = n - nMafia - nUnder;
  const roles = [];
  for (let i = 0; i < nMafia; i++) roles.push('mafia');
  for (let i = 0; i < nPolice; i++) roles.push('police');
  for (let i = 0; i < nUnder; i++) roles.push('undercover');
  return shuffle(roles);
}

function startDistribution() {
  const names = STATE.players.map((p, i) => p.name.trim() || `Joueur ${i + 1}`);
  if (names.length < 3) { showAlert('alert-config', 'Il faut au moins 3 joueurs !'); return; }
  const dupes = names.filter((n, i) => names.indexOf(n) !== i);
  if (dupes.length) { showAlert('alert-config', 'Les noms doivent être uniques !'); return; }

  const roles = getRoles(names.length);
  STATE.players = names.map((name, i) => ({ name, role: roles[i], alive: true }));
  STATE.round = 1;
  STATE.revealIndex = 0;

  showScreen('screen-reveal');
  showRevealWaiting();
  playChime();
}

// ============================================================
//  REVEAL
// ============================================================
function showRevealWaiting() {
  document.getElementById('reveal-waiting').style.display = 'block';
  document.getElementById('reveal-showing').style.display = 'none';
  const p = STATE.players[STATE.revealIndex];
  document.getElementById('reveal-player-name').textContent = p.name;
}

function showRole() {
  const p = STATE.players[STATE.revealIndex];
  const role = ROLES[p.role];
  const n = STATE.players.length;

  document.getElementById('reveal-waiting').style.display = 'none';
  document.getElementById('reveal-showing').style.display = 'block';

  document.getElementById('reveal-progress').textContent =
    `Joueur ${STATE.revealIndex + 1} / ${n}`;
  document.getElementById('dossier-num').textContent =
    String(STATE.revealIndex + 1).padStart(3, '0');
  document.getElementById('dossier-player-name').textContent = p.name;
  document.getElementById('dossier-role-name').textContent = role.name;
  document.getElementById('dossier-role-desc').textContent = role.desc;

  // Classe CSS dossier
  const dossier = document.getElementById('reveal-dossier');
  dossier.className = 'dossier ' + role.cssClass;

  // Emoji
  document.getElementById('role-image-container').innerHTML =
    `<div class="role-image-placeholder ${role.cssClass}">${role.emoji}</div>`;

  // Info extra
  const extra = document.getElementById('dossier-extra');
  if (p.role === 'mafia') {
    const complices = STATE.players
      .filter(x => x.role === 'mafia' && x.name !== p.name)
      .map(x => x.name);
    extra.innerHTML = complices.length
      ? `<div class="role-extra" style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.4);color:#e57373;">
           🔫 Vos complices : <strong>${complices.join(', ')}</strong>
         </div>`
      : `<div class="role-extra" style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.4);color:#e57373;">
           🔫 Vous êtes seul dans la Famiglia
         </div>`;
  } else if (p.role === 'undercover') {
    const mafieux = STATE.players
      .filter(x => x.role === 'mafia')
      .map(x => x.name);
    extra.innerHTML = `<div class="role-extra" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.4);color:#c084fc;">
      🕵️ Les Mafieux sont : <strong>${mafieux.join(', ')}</strong>
    </div>`;
  } else {
    extra.innerHTML = '';
  }

  // Bouton dernière carte
  document.getElementById('btn-next-player').textContent =
    STATE.revealIndex >= n - 1 ? 'Commencer la Nuit →' : 'Passer au suivant →';

  playChime();
}

function nextPlayer() {
  STATE.revealIndex++;
  if (STATE.revealIndex >= STATE.players.length) {
    startNightSequence();
  } else {
    showRevealWaiting();
    playChime();
  }
}

// ============================================================
//  NIGHT
// ============================================================
async function startNightSequence() {
  showScreen('screen-night');
  document.getElementById('btn-day').disabled = true;
  document.getElementById('night-mafia-box').classList.remove('show');
  setNightInstruction('La ville s\'endort...');
  hideIndicator();

  await sleep(1500);

  // Mafia se réveille
  setNightInstruction('🔫 La Mafia ouvre les yeux.\nIdentifiez-vous en silence.');
  showIndicator('La Mafia est éveillée');
  await sleep(4000);

  // Montrer les mafieux (pour le MJ)
  const mafiaNames = STATE.players
    .filter(p => (p.role === 'mafia') && p.alive)
    .map(p => p.name);
  if (mafiaNames.length) {
    document.getElementById('night-mafia-box').textContent =
      '🔫 Mafia : ' + mafiaNames.join(', ');
    document.getElementById('night-mafia-box').classList.add('show');
  }
  await sleep(3000);

  // Mafia se rendort
  document.getElementById('night-mafia-box').classList.remove('show');
  setNightInstruction('La Mafia se rendort...');
  hideIndicator();
  await sleep(1500);

  // Infiltré ?
  const under = STATE.players.find(p => p.role === 'undercover' && p.alive);
  if (under) {
    setNightInstruction("🕵️ L'Infiltré ouvre les yeux.\nObservez en silence.");
    showIndicator("L'Infiltré est éveillé");
    await sleep(4000);
    setNightInstruction("L'Infiltré se rendort...");
    hideIndicator();
    await sleep(1500);
  }

  // Fin de nuit
  setNightInstruction('Tout le monde peut ouvrir les yeux.');
  showIndicator('Prêt pour le débat');
  document.getElementById('btn-day').disabled = false;
  playChime();
}

function setNightInstruction(text) {
  document.getElementById('night-instruction').textContent = text;
}
function showIndicator(text) {
  document.getElementById('indicator-text').textContent = text;
  document.getElementById('night-indicator').classList.add('visible');
}
function hideIndicator() {
  document.getElementById('night-indicator').classList.remove('visible');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function startNight() {
  STATE.round++;
  stopTimer();
  startNightSequence();
}

function goToMenu() {
  stopTimer();
  showScreen('screen-day');
  renderSuspects();
}

// ============================================================
//  DAY
// ============================================================
function startDay() {
  STATE.timerSeconds = 300;
  STATE.timerPaused = false;
  document.getElementById('day-round').textContent = `Tour ${STATE.round} — Le Débat`;
  document.getElementById('btn-pause').textContent = '⏸ Pause';
  showScreen('screen-day');
  renderSuspects();
  startTimer();
  playChime();
}

function renderSuspects() {
  const list = document.getElementById('suspects-list');
  list.innerHTML = '';
  STATE.players.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'suspect-item' + (p.alive ? '' : ' eliminated');
    div.innerHTML = `
      <div class="suspect-avatar">${p.name[0].toUpperCase()}</div>
      <div class="suspect-name">${p.name}</div>
      ${p.alive
        ? `<button class="btn-eliminate" onclick="eliminatePlayer(${i})">Éliminer</button>`
        : `<div style="font-size:11px;color:var(--rouge);letter-spacing:2px;">ÉLIMINÉ</div>`
      }
    `;
    list.appendChild(div);
  });
}

async function eliminatePlayer(idx) {
  const player = STATE.players[idx];
  if (!player.alive) return;
  flashScreen();
  player.alive = false;
  renderSuspects();
  playElim();
  checkVictory();
}

function checkVictory() {
  const alive = STATE.players.filter(p => p.alive);
  const aliveMafia = alive.filter(p => p.role === 'mafia' || p.role === 'undercover');
  const aliveGood = alive.filter(p => p.role !== 'mafia' && p.role !== 'undercover');

  if (aliveMafia.length === 0) {
    stopTimer();
    setTimeout(() => showGameOver('police'), 800);
  } else if (aliveMafia.length >= aliveGood.length) {
    stopTimer();
    setTimeout(() => showGameOver('mafia'), 800);
  }
}

function showGameOver(winner) {
  const titleEl = document.getElementById('gameover-winner');
  const subEl = document.getElementById('gameover-sub');
  if (winner === 'police') {
    titleEl.textContent = 'La Police Gagne';
    titleEl.className = 'gameover-winner winner-police';
    subEl.textContent = 'La Famiglia a été démantelée. La ville peut dormir en paix.';
    playWin();
  } else {
    titleEl.textContent = 'La Mafia Gagne';
    titleEl.className = 'gameover-winner winner-mafia';
    subEl.textContent = 'La Famiglia contrôle la ville. La corruption règne.';
    playLose();
  }
  showScreen('screen-gameover');
}

// ============================================================
//  TIMER
// ============================================================
function startTimer() {
  stopTimer();
  updateTimerDisplay();
  STATE.timerInterval = setInterval(() => {
    if (STATE.timerPaused) return;
    STATE.timerSeconds--;
    updateTimerDisplay();
    if (STATE.timerSeconds <= 60 && STATE.timerSeconds > 0) playTone(440, 0.1, 'sine', 0.1);
    if (STATE.timerSeconds <= 0) {
      stopTimer();
      playElim();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(STATE.timerInterval);
  STATE.timerInterval = null;
}

function updateTimerDisplay() {
  const m = Math.floor(STATE.timerSeconds / 60);
  const s = STATE.timerSeconds % 60;
  const el = document.getElementById('timer-display');
  el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  el.classList.toggle('urgent', STATE.timerSeconds <= 30 && STATE.timerSeconds > 0);
}

function addTime(sec) {
  STATE.timerSeconds += sec;
  updateTimerDisplay();
}

function togglePause() {
  STATE.timerPaused = !STATE.timerPaused;
  document.getElementById('btn-pause').textContent =
    STATE.timerPaused ? '▶ Reprendre' : '⏸ Pause';
}

// ============================================================
//  RESTART
// ============================================================
function restartGame() {
  stopTimer();
  STATE.players = [];
  STATE.round = 1;
  STATE.timerSeconds = 300;
  STATE.timerPaused = false;
  showScreen('screen-config');
  initDefaultPlayers();
}

// ============================================================
//  UTILITIES
// ============================================================
function flashScreen() {
  const o = document.getElementById('flash-overlay');
  o.style.opacity = '1';
  setTimeout(() => { o.style.opacity = '0'; }, 80);
}

function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
