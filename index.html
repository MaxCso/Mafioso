<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafia Noir</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Georgia', serif;
  background: #0a0a0f;
  color: #e8d5b0;
  min-height: 100vh;
  overflow-x: hidden;
}

.screen { display: none; min-height: 100vh; padding: 20px; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* LAUNCH */
.launch-box {
  text-align: center;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #8b6914;
  border-radius: 16px;
  padding: 50px 40px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 0 40px rgba(139,105,20,0.3);
}
.launch-hat { font-size: 80px; margin-bottom: 20px; }
.launch-title {
  font-size: 42px;
  font-weight: bold;
  color: #d4a017;
  letter-spacing: 6px;
  margin-bottom: 8px;
}
.launch-sub { font-size: 13px; letter-spacing: 3px; color: #8b7355; margin-bottom: 30px; }
.launch-divider { width: 60px; height: 2px; background: #8b6914; margin: 0 auto 30px; }

.btn-primary {
  background: linear-gradient(135deg, #8b6914, #d4a017);
  color: #0a0a0f;
  border: none;
  padding: 16px 40px;
  font-size: 16px;
  font-weight: bold;
  letter-spacing: 2px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  margin-bottom: 12px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,160,23,0.4); }

.btn-secondary {
  background: transparent;
  color: #8b7355;
  border: 1px solid #8b7355;
  padding: 12px 30px;
  font-size: 14px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  transition: all 0.2s;
}
.btn-secondary:hover { color: #d4a017; border-color: #d4a017; }

/* CONFIG */
.config-box {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #8b6914;
  border-radius: 16px;
  padding: 40px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 0 40px rgba(139,105,20,0.3);
}
.config-title { font-size: 24px; color: #d4a017; letter-spacing: 3px; margin-bottom: 30px; text-align: center; }

.player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.player-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid #8b6914;
  border-radius: 8px;
  padding: 12px 14px;
  color: #e8d5b0;
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
.player-input:focus { border-color: #d4a017; }
.player-input::placeholder { color: #4a4a5a; }

.player-count-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  padding: 14px 18px;
  border: 1px solid #333;
}
.count-label { font-size: 13px; color: #8b7355; letter-spacing: 1px; }
.count-controls { display: flex; align-items: center; gap: 16px; }
.count-btn {
  background: #8b6914;
  color: #fff;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.count-btn:hover { background: #d4a017; }
.count-val { font-size: 22px; color: #d4a017; font-weight: bold; min-width: 30px; text-align: center; }

/* ROLES */
.roles-box {
  max-width: 600px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.roles-title { font-size: 26px; color: #d4a017; letter-spacing: 3px; text-align: center; }
.roles-subtitle { text-align: center; color: #8b7355; font-size: 13px; letter-spacing: 1px; }

.role-card {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #333;
  border-radius: 16px;
  padding: 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s;
}
.role-card.revealed { border-color: #d4a017; }
.role-card .player-name { font-size: 18px; color: #8b7355; margin-bottom: 16px; letter-spacing: 2px; }
.role-card .role-emoji { font-size: 60px; margin-bottom: 12px; filter: blur(6px); transition: filter 0.5s; }
.role-card.revealed .role-emoji { filter: none; }
.role-card .role-name { font-size: 22px; font-weight: bold; margin-bottom: 8px; opacity: 0; transition: opacity 0.5s; }
.role-card.revealed .role-name { opacity: 1; }
.role-card .role-desc { font-size: 13px; color: #8b7355; opacity: 0; transition: opacity 0.5s; }
.role-card.revealed .role-desc { opacity: 1; }
.reveal-btn {
  background: linear-gradient(135deg, #8b6914, #d4a017);
  color: #0a0a0f;
  border: none;
  padding: 10px 30px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 12px;
  transition: transform 0.2s;
}
.reveal-btn:hover { transform: scale(1.05); }

/* GAME */
.game-box {
  max-width: 600px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.phase-banner {
  text-align: center;
  padding: 20px;
  border-radius: 12px;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 3px;
}
.phase-banner.night { background: linear-gradient(135deg, #0d0d1a, #1a1a3e); color: #6677ff; border: 2px solid #334; }
.phase-banner.day { background: linear-gradient(135deg, #2a1a00, #3a2800); color: #ffcc44; border: 2px solid #554; }

.timer-box {
  text-align: center;
  font-size: 48px;
  font-weight: bold;
  color: #d4a017;
  padding: 10px;
}
.timer-box.urgent { color: #ff4444; animation: pulse 0.5s infinite alternate; }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

.players-list { display: flex; flex-direction: column; gap: 8px; }
.player-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 14px 18px;
  transition: all 0.3s;
}
.player-row.eliminated { opacity: 0.4; text-decoration: line-through; border-color: #ff4444; }
.player-info { display: flex; align-items: center; gap: 12px; }
.player-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: bold; color: #0a0a0f;
}
.player-row-name { font-size: 15px; font-weight: bold; }
.player-status { font-size: 12px; color: #8b7355; }

.btn-eliminate {
  background: #8b1a1a;
  color: #ff9999;
  border: 1px solid #cc3333;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.btn-eliminate:hover { background: #cc3333; }
.btn-eliminate:disabled { opacity: 0.3; cursor: default; }

.action-row {
  display: flex;
  gap: 12px;
}
.action-row .btn-primary { margin: 0; }

/* END */
.end-box {
  text-align: center;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #8b6914;
  border-radius: 16px;
  padding: 50px 40px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 0 60px rgba(139,105,20,0.4);
}
.end-trophy { font-size: 80px; margin-bottom: 20px; }
.end-title { font-size: 32px; color: #d4a017; font-weight: bold; letter-spacing: 4px; margin-bottom: 16px; }
.end-winner { font-size: 20px; color: #e8d5b0; margin-bottom: 30px; }
.end-stats { text-align: left; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 20px; margin-bottom: 30px; }
.end-stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 14px; }
.end-stat-row:last-child { border-bottom: none; }

/* LOG */
.log-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid #333;
  border-radius: 10px;
  padding: 16px;
  max-height: 200px;
  overflow-y: auto;
  font-size: 13px;
  color: #8b7355;
  line-height: 1.8;
}

.round-badge {
  text-align: center;
  font-size: 12px;
  letter-spacing: 2px;
  color: #8b7355;
  padding: 8px;
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #8b6914;
  border-radius: 16px;
  padding: 40px;
  max-width: 380px;
  width: 90%;
  text-align: center;
}
.modal-emoji { font-size: 60px; margin-bottom: 16px; }
.modal-title { font-size: 22px; color: #d4a017; margin-bottom: 12px; font-weight: bold; }
.modal-text { color: #8b7355; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.modal-btns { display: flex; gap: 12px; }
.modal-btns .btn-primary { margin: 0; }
</style>
</head>
<body>

<!-- ÉCRAN 1 : LAUNCH -->
<div class="screen active" id="screen-launch">
  <div class="launch-box">
    <div class="launch-hat">🎩</div>
    <div class="launch-title">MAFIA NOIR</div>
    <div class="launch-sub">JEU DE RÔLES & DE DÉDUCTION</div>
    <div class="launch-divider"></div>
    <button class="btn-primary" onclick="showScreen('screen-config')">COMMENCER</button>
    <button class="btn-secondary" id="btnResume" onclick="onResume()" style="display:none">▶ REPRENDRE LA PARTIE</button>
  </div>
</div>

<!-- ÉCRAN 2 : CONFIG -->
<div class="screen" id="screen-config">
  <div class="config-box">
    <div class="config-title">🃏 CONFIGURATION</div>

    <div class="player-count-row">
      <div class="count-label">NOMBRE DE JOUEURS</div>
      <div class="count-controls">
        <button class="count-btn" onclick="changeCount(-1)">−</button>
        <div class="count-val" id="countVal">4</div>
        <button class="count-btn" onclick="changeCount(1)">+</button>
      </div>
    </div>

    <div class="player-grid" id="playerGrid"></div>

    <button class="btn-primary" id="btnStart" onclick="startGame()" disabled>LANCER LA PARTIE</button>
    <button class="btn-secondary" onclick="showScreen('screen-launch')" style="margin-top:8px">← RETOUR</button>
  </div>
</div>

<!-- ÉCRAN 3 : ATTRIBUTION DES RÔLES -->
<div class="screen" id="screen-roles">
  <div class="roles-box">
    <div class="roles-title">🎭 ATTRIBUTION DES RÔLES</div>
    <div class="roles-subtitle">CHAQUE JOUEUR RÉVÈLE SON RÔLE EN PRIVÉ</div>
    <div id="roleCards"></div>
    <button class="btn-primary" id="btnGoGame" onclick="showScreen('screen-game')" style="display:none">COMMENCER LA PARTIE ►</button>
  </div>
</div>

<!-- ÉCRAN 4 : JEU -->
<div class="screen" id="screen-game">
  <div class="game-box">
    <div class="round-badge" id="roundBadge">MANCHE 1</div>

    <div class="phase-banner night" id="phaseBanner">🌙 NUIT</div>

    <div class="timer-box" id="timerBox">5:00</div>

    <div class="players-list" id="playersList"></div>

    <div class="log-box" id="logBox">Le jeu commence...</div>

    <div class="action-row">
      <button class="btn-primary" id="btnPhase" onclick="nextPhase()" style="flex:1">☀️ PASSER AU JOUR</button>
      <button class="btn-secondary" onclick="confirmQuit()" style="width:auto;padding:0 20px">✕</button>
    </div>
  </div>
</div>

<!-- ÉCRAN 5 : FIN -->
<div class="screen" id="screen-end">
  <div class="end-box">
    <div class="end-trophy" id="endTrophy">🏆</div>
    <div class="end-title" id="endTitle">VICTOIRE !</div>
    <div class="end-winner" id="endWinner"></div>
    <div class="end-stats" id="endStats"></div>
    <button class="btn-primary" onclick="showScreen('screen-launch')">NOUVELLE PARTIE</button>
  </div>
</div>

<!-- MODAL CONFIRMATION -->
<div class="modal-overlay" id="modalQuit">
  <div class="modal-box">
    <div class="modal-emoji">⚠️</div>
    <div class="modal-title">QUITTER ?</div>
    <div class="modal-text">La partie en cours sera sauvegardée. Vous pourrez la reprendre plus tard.</div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal('modalQuit')" style="flex:1">ANNULER</button>
      <button class="btn-primary" onclick="quitGame()" style="flex:1;margin:0">QUITTER</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// ÉTAT DU JEU
// ═══════════════════════════════════════
let G = {
  players: [],      // [{name, role, alive}]
  phase: 'night',   // 'night' | 'day'
  round: 1,
  logs: [],
  timerInterval: null,
  timerSeconds: 300,
  revealedCount: 0
};

const ROLES_CONFIG = [
  { key: 'mafia',    name: 'MAFIA',      emoji: '🔫', color: '#cc3333', desc: 'Eliminez les innocents chaque nuit.' },
  { key: 'police',   name: 'COMMISSAIRE',emoji: '🔍', color: '#3399ff', desc: 'Identifiez un joueur chaque nuit.' },
  { key: 'medecin',  name: 'MÉDECIN',    emoji: '💊', color: '#33cc66', desc: 'Sauvez un joueur chaque nuit.' },
  { key: 'civil',    name: 'CIVIL',      emoji: '👤', color: '#888888', desc: 'Déduisez et votez pendant le jour.' }
];

const ROLE_COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63'];

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if (id === 'screen-config') initConfig();
  if (id === 'screen-game') initGame();
}

// ═══════════════════════════════════════
// LAUNCH
// ═══════════════════════════════════════
window.onload = function() {
  const saved = localStorage.getItem('mafianoir_save');
  if (saved) {
    document.getElementById('btnResume').style.display = 'block';
  }
};

function onResume() {
  try {
    G = JSON.parse(localStorage.getItem('mafianoir_save'));
    showScreen('screen-game');
    renderGame();
  } catch(e) {
    alert('Impossible de reprendre la partie.');
  }
}

// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
let playerCount = 4;

function initConfig() {
  renderPlayerInputs();
}

function changeCount(delta) {
  playerCount = Math.max(4, Math.min(12, playerCount + delta));
  document.getElementById('countVal').textContent = playerCount;
  renderPlayerInputs();
}

function renderPlayerInputs() {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = '';
  for (let i = 0; i < playerCount; i++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'player-input';
    inp.placeholder = 'Joueur ' + (i + 1);
    inp.maxLength = 16;
    inp.addEventListener('input', checkCanStart);
    grid.appendChild(inp);
  }
  checkCanStart();
}

function checkCanStart() {
  const inputs = document.querySelectorAll('.player-input');
  const allFilled = [...inputs].every(i => i.value.trim().length > 0);
  document.getElementById('btnStart').disabled = !allFilled;
}

// ═══════════════════════════════════════
// ATTRIBUTION DES RÔLES
// ═══════════════════════════════════════
function startGame() {
  const inputs = document.querySelectorAll('.player-input');
  const names = [...inputs].map(i => i.value.trim());

  // Calculer les rôles
  const n = names.length;
  const mafiaCount = Math.max(1, Math.floor(n / 4));
  const roles = [];
  
  for (let i = 0; i < mafiaCount; i++) roles.push('mafia');
  if (n >= 5) roles.push('police');
  if (n >= 6) roles.push('medecin');
  while (roles.length < n) roles.push('civil');

  // Mélanger
  roles.sort(() => Math.random() - 0.5);

  G = {
    players: names.map((name, i) => ({ name, role: roles[i], alive: true })),
    phase: 'night',
    round: 1,
    logs: ['La partie commence. Bonne chance !'],
    timerInterval: null,
    timerSeconds: 300,
    revealedCount: 0
  };

  showScreen('screen-roles');
  renderRoleCards();
}

function getRoleConfig(key) {
  return ROLES_CONFIG.find(r => r.key === key) || ROLES_CONFIG[3];
}

function renderRoleCards() {
  const container = document.getElementById('roleCards');
  container.innerHTML = '';
  G.revealedCount = 0;

  G.players.forEach((p, i) => {
    const rc = getRoleConfig(p.role);
    const card = document.createElement('div');
    card.className = 'role-card';
    card.id = 'roleCard' + i;
    card.style.marginBottom = '12px';
    card.innerHTML = `
      <div class="player-name">👤 ${p.name}</div>
      <div class="role-emoji" id="rEmoji${i}">${rc.emoji}</div>
      <div class="role-name" id="rName${i}" style="color:${rc.color}">${rc.name}</div>
      <div class="role-desc" id="rDesc${i}">${rc.desc}</div>
      <button class="reveal-btn" id="rBtn${i}" onclick="revealRole(${i})">👁 VOIR MON RÔLE</button>
    `;
    container.appendChild(card);
  });

  document.getElementById('btnGoGame').style.display = 'none';
}

function revealRole(i) {
  const card = document.getElementById('roleCard' + i);
  card.classList.add('revealed');
  document.getElementById('rBtn' + i).style.display = 'none';
  G.revealedCount++;
  if (G.revealedCount === G.players.length) {
    document.getElementById('btnGoGame').style.display = 'block';
  }
}

// ═══════════════════════════════════════
// JEU
// ═══════════════════════════════════════
function initGame() {
  G.phase = 'night';
  G.timerSeconds = 300;
  renderGame();
  startTimer();
  saveGame();
}

function renderGame() {
  // Phase banner
  const banner = document.getElementById('phaseBanner');
  const btn = document.getElementById('btnPhase');
  const round = document.getElementById('roundBadge');

  round.textContent = 'MANCHE ' + G.round;

  if (G.phase === 'night') {
    banner.className = 'phase-banner night';
    banner.textContent = '🌙 NUIT';
    btn.textContent = '☀️ PASSER AU JOUR';
  } else {
    banner.className = 'phase-banner day';
    banner.textContent = '☀️ JOUR';
    btn.textContent = '🌙 PASSER À LA NUIT';
  }

  // Liste joueurs
  const list = document.getElementById('playersList');
  list.innerHTML = '';
  G.players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row' + (p.alive ? '' : ' eliminated');

    const color = ROLE_COLORS[i % ROLE_COLORS.length];
    const initial = p.name.charAt(0).toUpperCase();

    row.innerHTML = `
      <div class="player-info">
        <div class="player-avatar" style="background:${color}">${initial}</div>
        <div>
          <div class="player-row-name">${p.name}</div>
          <div class="player-status">${p.alive ? 'En vie' : 'Éliminé'}</div>
        </div>
      </div>
      ${p.alive ? `<button class="btn-eliminate" onclick="eliminatePlayer(${i})">ÉLIMINER</button>` : '<span style="color:#ff4444;font-size:12px">☠️</span>'}
    `;
    list.appendChild(row);
  });

  // Log
  const log = document.getElementById('logBox');
  log.innerHTML = G.logs.slice(-10).map(l => `<div>• ${l}</div>`).join('');
  log.scrollTop = log.scrollHeight;
}

function startTimer() {
  if (G.timerInterval) clearInterval(G.timerInterval);
  updateTimerDisplay();
  G.timerInterval = setInterval(() => {
    G.timerSeconds--;
    updateTimerDisplay();
    if (G.timerSeconds <= 0) {
      clearInterval(G.timerInterval);
      addLog('⏰ Temps écoulé !');
    }
    saveGame();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(G.timerSeconds / 60);
  const s = G.timerSeconds % 60;
  const box = document.getElementById('timerBox');
  box.textContent = m + ':' + String(s).padStart(2, '0');
  box.className = 'timer-box' + (G.timerSeconds <= 30 ? ' urgent' : '');
}

function nextPhase() {
  if (G.phase === 'night') {
    G.phase = 'day';
    addLog('☀️ Le jour se lève — débattez et votez !');
  } else {
    G.phase = 'night';
    G.round++;
    addLog('🌙 La nuit tombe — la Mafia agit...');
  }
  G.timerSeconds = 300;
  renderGame();
  startTimer();
  checkWin();
  saveGame();
}

function eliminatePlayer(i) {
  const p = G.players[i];
  if (!p.alive) return;
  p.alive = false;
  const rc = getRoleConfig(p.role);
  addLog(`☠️ ${p.name} est éliminé — c'était un ${rc.name}`);
  renderGame();
  if (!checkWin()) saveGame();
}

function addLog(msg) {
  G.logs.push(msg);
  const log = document.getElementById('logBox');
  if (log) {
    log.innerHTML = G.logs.slice(-10).map(l => `<div>• ${l}</div>`).join('');
    log.scrollTop = log.scrollHeight;
  }
}

function checkWin() {
  const alive = G.players.filter(p => p.alive);
  const aliveMafia = alive.filter(p => p.role === 'mafia').length;
  const aliveOthers = alive.filter(p => p.role !== 'mafia').length;

  if (aliveMafia === 0) {
    endGame('police');
    return true;
  }
  if (aliveMafia >= aliveOthers) {
    endGame('mafia');
    return true;
  }
  return false;
}

function endGame(winner) {
  if (G.timerInterval) clearInterval(G.timerInterval);
  localStorage.removeItem('mafianoir_save');

  const trophy = document.getElementById('endTrophy');
  const title = document.getElementById('endTitle');
  const winnerEl = document.getElementById('endWinner');
  const stats = document.getElementById('endStats');

  if (winner === 'mafia') {
    trophy.textContent = '🔫';
    title.textContent = 'LA MAFIA GAGNE !';
    title.style.color = '#cc3333';
    winnerEl.textContent = 'La Mafia a pris le contrôle de la ville.';
  } else {
    trophy.textContent = '🔍';
    title.textContent = 'LA POLICE GAGNE !';
    title.style.color = '#3399ff';
    winnerEl.textContent = 'La Mafia a été démasquée et éliminée !';
  }

  const eliminated = G.players.filter(p => !p.alive);
  stats.innerHTML = `
    <div class="end-stat-row"><span>Manches jouées</span><span>${G.round}</span></div>
    <div class="end-stat-row"><span>Joueurs éliminés</span><span>${eliminated.length} / ${G.players.length}</span></div>
    <div class="end-stat-row"><span>Survivants</span><span>${G.players.filter(p => p.alive).map(p => p.name).join(', ') || 'Aucun'}</span></div>
    <hr style="border-color:#333;margin:12px 0">
    ${G.players.map(p => {
      const rc = getRoleConfig(p.role);
      return `<div class="end-stat-row"><span>${p.name}</span><span style="color:${rc.color}">${rc.emoji} ${rc.name}</span></div>`;
    }).join('')}
  `;

  showScreen('screen-end');
}

// ═══════════════════════════════════════
// SAVE / QUIT
// ═══════════════════════════════════════
function saveGame() {
  try {
    localStorage.setItem('mafianoir_save', JSON.stringify(G));
  } catch(e) {}
}

function confirmQuit() {
  document.getElementById('modalQuit').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function quitGame() {
  if (G.timerInterval) clearInterval(G.timerInterval);
  saveGame();
  closeModal('modalQuit');
  showScreen('screen-launch');
  document.getElementById('btnResume').style.display = 'block';
}
</script>
